<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Video + Danmu Player</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .video-container {
            position: relative;
        }

        video {
            width: 640px;
            background: black;
        }

        .danmu-box {
            width: 300px;
            height: 360px;
            border: 1px solid #ddd;
            padding: 10px;
            overflow-y: auto;
            background: #fafafa;
        }

        .danmu-item {
            padding: 6px 8px;
            margin-bottom: 6px;
            background: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        .active {
            background: #ffe08a;
        }

        .controls {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="video_play.html">Video Play</a></li>
            </ul>
        </nav>
    </header>
    <div>
        <div class="controls">
            <input type="file" id="videoInput" accept="video/*">
        </div>

        <div class="video-container">
            <video id="video" controls></video>
        </div>
    </div>

    <div class="danmu-box" id="danmuBox"></div>

    <script>
        const video = document.getElementById("video");
        const danmuBox = document.getElementById("danmuBox");

        // Convert "0:00:05" → seconds
        const timeToSeconds = (t) => {
            const parts = t.split(":").map(Number);
            if (parts.length === 3) {
                return parts[0] * 3600 + parts[1] * 60 + parts[2];
            }
            if (parts.length === 2) {
                return parts[0] * 60 + parts[1];
            }
            return 0;
        };

        // Load danmu from localStorage
        const danmuData = JSON.parse(localStorage.getItem("danmuData") || "[]")
            .map(d => ({
                ...d,
                seconds: timeToSeconds(d.time),
                shown: false
            }))
            .sort((a, b) => a.seconds - b.seconds);

        // Render list in sidebar
        danmuData.forEach((d, index) => {
            const div = document.createElement("div");
            div.className = "danmu-item";
            div.textContent = `${d.time} - ${d.content}`;
            div.dataset.index = index;
            danmuBox.appendChild(div);
        });

        const danmuElements = document.querySelectorAll(".danmu-item");

        // Video file upload
        document.getElementById("videoInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            video.src = url;
        });

        // Sync danmu with video time
        video.addEventListener("timeupdate", () => {
            const currentTime = video.currentTime;

            danmuData.forEach((d, i) => {
                if (!d.shown && currentTime >= d.seconds) {
                    d.shown = true;

                    const el = danmuElements[i];
                    if (el) el.classList.add("active");

                    // optional: auto-scroll
                    el?.scrollIntoView({ behavior: "smooth", block: "center" });
                }
            });
        });

        // Reset when video replays
        video.addEventListener("seeked", () => {
            const currentTime = video.currentTime;

            danmuData.forEach(d => {
                d.shown = currentTime >= d.seconds;
            });

            danmuElements.forEach(el => el.classList.remove("active"));
        });
    </script>

</body>

</html>
